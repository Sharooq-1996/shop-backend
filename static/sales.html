<!DOCTYPE html>
<html>
<head>
<title>Sales - Ayan Watch and Electronics</title>

<style>
body{font-family:Arial;background:#eef2f3;padding:20px;}
.container{background:white;padding:20px;max-width:1300px;margin:auto;border-radius:10px;}
.tabs{display:flex;gap:10px;margin-bottom:15px;}
.tabs button{padding:8px 15px;border:none;background:#1f7ae0;color:white;border-radius:5px;cursor:pointer;}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:15px;margin-bottom:20px;}
.product{border:1px solid #ddd;padding:10px;text-align:center;border-radius:8px;cursor:pointer;}
.product img{width:100%;height:130px;object-fit:contain;}
.selected{border:2px solid green;}
.form-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:15px;}
input,select{padding:8px;}
button{padding:8px 15px;border:none;background:#28a745;color:white;border-radius:5px;cursor:pointer;}
.summary{display:flex;gap:15px;margin-top:15px;}
.box{flex:1;background:#f1f7ff;padding:10px;text-align:center;border-radius:6px;font-weight:bold;}
table{width:100%;border-collapse:collapse;margin-top:15px;}
th,td{border:1px solid #ddd;padding:6px;text-align:center;}
th{background:#1f7ae0;color:white;}
.print-btn{background:#ff9800;}
.reset-btn{background:#f44336;}
.hidden{display:none;}
@media print{
button,.tabs,.form-grid,.product-grid,#searchDate,#reportBranchFilter{display:none;}
}
</style>
</head>

<body>
<div class="container">

<h2>Ayan Watch and Electronics - POS</h2>

<div class="tabs">
<button onclick="filterCategory('watch')">Watches</button>
<button onclick="filterCategory('cell')">Cells</button>
<button onclick="filterCategory('accessory')">Accessories</button>
</div>

<div class="product-grid" id="productGrid"></div>

<div class="form-grid">

<select id="shopSelect">
<option value="Gandhipark">Ayan Watch - Gandhipark Branch</option>
<option value="KurnoolRoad">Ayan Watch - Kurnool Road Branch</option>
</select>

<input id="customerName" placeholder="Customer Name">
<input id="description" placeholder="Description">

<select id="cellSelect" class="hidden"></select>

<select id="warrantySelect">
<option value="">Select Warranty</option>
<option>3 Months</option>
<option>6 Months</option>
<option>1 Year</option>
</select>

<input id="quantity" type="number" value="1">
<input id="price" type="number" placeholder="Enter Price">

<!-- NEW FIELD (Backdated Sales Support) -->
<input id="saleDate" type="date" title="Optional: Add yesterday sales">

<select id="paymentMethod">
<option>Cash</option>
<option>UPI</option>
<option>Card</option>
</select>
</div>

<button onclick="addToCart()">Add To Cart</button>
<button onclick="confirmSale()">Confirm Sale</button>
<button onclick="printAll()" class="print-btn">Print Bill</button>
<button onclick="resetAll()" class="reset-btn">Reset All</button>

<h3>Cart</h3>
<table>
<thead>
<tr>
<th>Product</th>
<th>Description</th>
<th>Cell</th>
<th>Warranty</th>
<th>Qty</th>
<th>Price</th>
<th>Remove</th>
</tr>
</thead>
<tbody id="cartBody"></tbody>
</table>

<hr>

<h3>Sales Report</h3>

<input type="date" id="searchDate">
<button onclick="applyFilters()">Search</button>
<button onclick="todaySales()">Today</button>

<select id="reportBranchFilter" onchange="applyFilters()">
<option value="All">All Branches</option>
<option value="Gandhipark">Gandhipark Branch</option>
<option value="KurnoolRoad">Kurnool Road Branch</option>
</select>

<div class="summary">
<div class="box">
Gandhipark Branch<br>
Count: <span id="gpCount">0</span><br>
Amount ₹ <span id="gpAmount">0.00</span>
</div>

<div class="box">
Kurnool Road Branch<br>
Count: <span id="krCount">0</span><br>
Amount ₹ <span id="krAmount">0.00</span>
</div>
</div>

<table>
<thead>
<tr>
<th>ID</th>
<th>Branch</th>
<th>Customer</th>
<th>Product</th>
<th>Description</th>
<th>Cell</th>
<th>Warranty</th>
<th>Qty</th>
<th>Price</th>
<th>Payment</th>
<th>Date</th>
<th>Action</th>
</tr>
</thead>
<tbody id="salesBody"></tbody>
</table>

</div>

<script>

let selectedProduct="";
let cart=[];
let allSalesData=[];

const products=[
{name:"Gents Belt Watch",category:"watch",img:"./gents-belt.png"},
{name:"Gents Chain Watch",category:"watch",img:"./gents-chain.png"},
{name:"Ladies Belt Watch",category:"watch",img:"./ladies-belt.png"},
{name:"Ladies Chain Watch",category:"watch",img:"./ladies-chain.png"},
{name:"Wall Clock",category:"watch",img:"./wall-clock.png"},
{name:"Alarm Timepiece",category:"watch",img:"./alarm.png"},
{name:"Titan Cell",category:"cell",img:"./TitanCells.png"},
{name:"Watch Cell",category:"cell",img:"./watch-cell.png"},
{name:"Strap",category:"accessory",img:"./straps.png"},
{name:"Chain",category:"accessory",img:"./chain.png"},
{name:"Repair",category:"accessory",img:"./repair.png"}
];

function filterCategory(cat){
const grid=document.getElementById("productGrid");
grid.innerHTML="";
products.filter(p=>p.category===cat).forEach(function(p){
grid.innerHTML+=
'<div class="product" onclick="selectProduct(\''+p.name+'\',this)">'+
'<img src="'+p.img+'">'+
'<div>'+p.name+'</div>'+
'</div>';
});
}
filterCategory("watch");

function selectProduct(name,el){
selectedProduct=name;

document.querySelectorAll(".product").forEach(p=>p.classList.remove("selected"));
if(el) el.classList.add("selected");

const cellSelect=document.getElementById("cellSelect");

if(name==="Watch Cell"){
cellSelect.classList.remove("hidden");
cellSelect.innerHTML=`
<option value="">Select Watch Cell</option>
<option>G1</option>
<option>521</option>
<option>626</option>
<option>621</option>
<option>721</option>
<option>920</option>
<option>2016</option>
<option>2025</option>
<option>2032</option>
<option>Others</option>
`;
}
else if(name==="Titan Cell"){
cellSelect.classList.remove("hidden");
cellSelect.innerHTML=`
<option value="">Select Titan Cell</option>
<option>521</option>
<option>626</option>
<option>621</option>
<option>721</option>
<option>920</option>
<option>Others</option>
`;
}
else{
cellSelect.classList.add("hidden");
cellSelect.innerHTML="";
}
}

function addToCart(){
if(!selectedProduct){alert("Select product");return;}

cart.push({
product:selectedProduct,
description:description.value,
cell:cellSelect.value,
warranty:warrantySelect.value,
qty:parseInt(quantity.value),
price:parseFloat(price.value)
});

renderCart();
clearForm();
}

function clearForm(){
description.value="";
quantity.value=1;
price.value="";
warrantySelect.value="";
cellSelect.value="";
}

function renderCart(){
const body=document.getElementById("cartBody");
body.innerHTML="";
cart.forEach(function(item,index){
body.innerHTML+=
"<tr>"+
"<td>"+item.product+"</td>"+
"<td>"+(item.description||"-")+"</td>"+
"<td>"+(item.cell||"-")+"</td>"+
"<td>"+(item.warranty||"-")+"</td>"+
"<td>"+item.qty+"</td>"+
"<td>₹"+item.price+"</td>"+
"<td><button onclick='removeCart("+index+")'>X</button></td>"+
"</tr>";
});
}

function removeCart(i){
cart.splice(i,1);
renderCart();
}

async function confirmSale(){

if(cart.length===0){alert("Cart empty");return;}

const manualDate=document.getElementById("saleDate").value;

for(const item of cart){

await fetch("/sales/create",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({

shopName:shopSelect.value,
customerName:customerName.value,
productName:item.product,
description:item.description,
cellName:item.cell,
warranty:item.warranty,
quantity:item.qty,
price:item.price,
paymentMethod:paymentMethod.value,

saleDate:manualDate || null

})
});

}

cart=[];
renderCart();
customerName.value="";
document.getElementById("saleDate").value="";

loadSales();
}

function loadSales(){
fetch("/sales")
.then(r=>r.json())
.then(function(data){
allSalesData=data;
applyFilters();
});
}

function applyFilters(){

let filtered=[...allSalesData];

const branchFilter=document.getElementById("reportBranchFilter").value;
const dateFilter=document.getElementById("searchDate").value;

if(branchFilter!=="All"){
filtered=filtered.filter(s=>s.shopName===branchFilter);
}

if(dateFilter){

filtered=filtered.filter(function(s){

const saleDate=new Date(s.createdDate)
.toLocaleDateString("en-CA",{timeZone:"Asia/Kolkata"})
.trim();

return saleDate===dateFilter.trim();

});

}

renderTable(filtered);

}

function todaySales(){

const today=new Date()
.toLocaleDateString("en-CA",{timeZone:"Asia/Kolkata"})
.trim();

document.getElementById("searchDate").value=today;

applyFilters();

}

function renderTable(data){

let gpCountVal=0,gpAmountVal=0;
let krCountVal=0,krAmountVal=0;

const tbody=document.getElementById("salesBody");
tbody.innerHTML="";

data.forEach(function(s){

if(s.shopName==="Gandhipark"){
gpCountVal+=s.quantity;
gpAmountVal+=s.quantity*s.price;
}

if(s.shopName==="KurnoolRoad"){
krCountVal+=s.quantity;
krAmountVal+=s.quantity*s.price;
}

tbody.innerHTML+=
"<tr>"+
"<td>"+s.saleId+"</td>"+
"<td>"+s.shopName+"</td>"+
"<td>"+s.customerName+"</td>"+
"<td>"+s.productName+"</td>"+
"<td>"+(s.description||"-")+"</td>"+
"<td>"+(s.cellName||"-")+"</td>"+
"<td>"+(s.warranty||"-")+"</td>"+
"<td>"+s.quantity+"</td>"+
"<td>₹"+s.price+"</td>"+
"<td>"+s.paymentMethod+"</td>"+
"<td>"+new Date(s.createdDate).toLocaleString("en-IN",{timeZone:"Asia/Kolkata"})+"</td>"+
"<td>"+
"<button onclick='printSingleSale("+s.saleId+")' class='print-btn'>Print</button> "+
"<button onclick='deleteSale("+s.saleId+")'>Delete</button>"+
"</td>"+
"</tr>";

});

document.getElementById("gpCount").innerText=gpCountVal;
document.getElementById("gpAmount").innerText=gpAmountVal.toFixed(2);
document.getElementById("krCount").innerText=krCountVal;
document.getElementById("krAmount").innerText=krAmountVal.toFixed(2);
}

function printSingleSale(id){

const s=allSalesData.find(x=>x.saleId===id);

if(!s)return;

const w=window.open("","_blank","width=400,height=600");

w.document.write(
"<h3 style='text-align:center'>Ayan Watch and Electronics</h3>"+
"<p><b>Branch:</b> "+s.shopName+"</p>"+
"<p><b>Customer:</b> "+s.customerName+"</p>"+
"<hr>"+
"<p><b>Product:</b> "+s.productName+"</p>"+
"<p><b>Cell:</b> "+(s.cellName||"-")+"</p>"+
"<p><b>Qty:</b> "+s.quantity+"</p>"+
"<p><b>Total:</b> ₹"+(s.quantity*s.price).toFixed(2)+"</p>"+
"<script>window.print();<\/script>"
);

w.document.close();

}

function deleteSale(id){
fetch("/sales/delete?id="+id).then(loadSales);
}

function resetAll(){
if(confirm("Delete all data?")){
fetch("/sales/reset",{method:"POST"}).then(loadSales);
}
}

function printAll(){window.print();}

loadSales();

</script>
</body>
</html>
